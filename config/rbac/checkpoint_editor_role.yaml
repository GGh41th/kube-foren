# This rule is not used by the project kube-foren itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the kubeforen.kubeforen.org.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kube-foren
    app.kubernetes.io/managed-by: kustomize
  name: checkpoint-editor-role
rules:
- apiGroups:
  - kubeforen.kubeforen.org
  resources:
  - checkpoints
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kubeforen.kubeforen.org
  resources:
  - checkpoints/status
  verbs:
  - get
